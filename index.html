<!DOCTYPE html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>Perplex Clone</title>
    
    <!-- PWA Meta Tags -->
    <meta name="theme-color" content="#191A1A" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <link rel="icon" href="/logo.svg" type="image/svg+xml">
    <link rel="apple-touch-icon" href="/logo.svg">
    <meta name="description" content="A high-fidelity clone of Perplex AI.">


    <style>
      :root {
        /* Premium Light Mode Variables (Notion-style, High Contrast) */
        --bg-primary: #F9F9F9;
        --bg-sidebar: #E5E5E5;
        --bg-secondary: #EBEBE9;
        --bg-hover: #E0E0DE;
        --bg-card: #F9F9F9;
        --bg-input: #F0F0EE;
        --border-color: #D6D6D4;
        --text-primary: #2D2B26;
        --text-muted: #6E6D6A;
      }

      /* Premium Dark Mode Variables (Lighter, Perplexity/Notion style) */
      .dark {
        --bg-primary: #191919;
        --bg-sidebar: #222222;
        --bg-secondary: #262626;
        --bg-hover: #2d2d2d;
        --bg-card: #222222;
        --bg-input: #2a2a2a;
        --border-color: #333333;
        --text-primary: #EBEBEB;
        --text-muted: #9B9B9B;
      }

      html, body {
        background-color: var(--bg-primary);
        color: var(--text-primary);
        -webkit-font-smoothing: antialiased;
        transition: background-color 0.15s, color 0.15s;
        /* Mobile Optimizations */
        overscroll-behavior-y: none; /* Prevent pull-to-refresh */
        -webkit-tap-highlight-color: transparent; /* Remove blue highlight on tap */
        touch-action: pan-x pan-y;
        overflow: hidden;
        height: 100%;
        width: 100%;
      }

      /* Custom scrollbar to match minimalist look */
      ::-webkit-scrollbar {
        width: 6px;
      }
      ::-webkit-scrollbar-track {
        background: transparent;
      }
      ::-webkit-scrollbar-thumb {
        background: var(--border-color);
        border-radius: 3px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: var(--text-muted);
      }
      .no-scrollbar::-webkit-scrollbar {
        display: none;
      }
      .no-scrollbar {
        -ms-overflow-style: none;
        scrollbar-width: none;
      }

      .pt-safe {
        padding-top: env(safe-area-inset-top);
      }
      .pb-safe {
        padding-bottom: env(safe-area-inset-bottom);
      }
      .mb-safe {
        margin-bottom: env(safe-area-inset-bottom);
      }
      .bottom-safe {
        bottom: env(safe-area-inset-bottom);
      }

      @keyframes spin-y {
        0% { transform: rotateY(0deg); }
        100% { transform: rotateY(360deg); }
      }
      .animate-spin-y {
        animation: spin-y 2s linear infinite;
      }

      /* PRINT STYLES FOR DASHBOARD EXPORT */
      @media print {
        body {
          background-color: white !important;
          color: black !important;
        }
        /* Hide all UI elements except the dashboard container */
        nav, header, aside, .sticky, button, input, textarea, .sidebar, .input-area {
          display: none !important;
        }
        /* Target the dashboard container specifically */
        #dashboard-container {
          display: block !important;
          position: static !important;
          width: 100% !important;
          height: auto !important;
          background: white !important;
          color: black !important;
          overflow: visible !important;
        }
        /* Ensure charts print correctly */
        .print-break-inside {
          break-inside: avoid;
        }
        /* Reset dark mode variables for print */
        .dark {
          --bg-card: #ffffff;
          --bg-secondary: #f3f4f6;
          --text-primary: #000000;
          --text-muted: #4b5563;
          --border-color: #e5e7eb;
        }
      }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="./index.tsx"></script>
  </body>
</html>
